<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Noto Sans Thai',sans-serif}
:root{--primary:#b91c1c;--primary-light:#dc2626;--primary-dark:#7f1d1d;--primary-50:#fef2f2;--primary-100:#fee2e2;--primary-200:#fecaca;--primary-bg:linear-gradient(135deg,#fef2f2 0%,#ffffff 50%,#fef2f2 100%)}
body{background:var(--primary-bg);min-height:100vh;color:#1f2937}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#e5a0a0;border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--primary)}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes pulseDot{0%,80%,100%{transform:scale(0);opacity:.5}40%{transform:scale(1);opacity:1}}
.animate-slide{animation:slideUp .3s ease-out}.animate-fade{animation:fadeIn .25s ease-out}
.dot{width:7px;height:7px;border-radius:50%;background:var(--primary);opacity:.5;animation:pulseDot 1.4s infinite ease-in-out both;display:inline-block}
.dot:nth-child(1){animation-delay:-.32s}.dot:nth-child(2){animation-delay:-.16s}.dot:nth-child(3){animation-delay:0s}
.app{display:flex;flex-direction:column;min-height:100vh}
header{background:linear-gradient(135deg,#510606, #6d1111, #410303);color:#fff;padding:12px 16px;position:relative;overflow:hidden}

.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.header-left{display:flex;align-items:center;gap:12px}

.logo img{width:100%;height:100%;object-fit:cover}
.header-title h1{font-size:1.5rem;font-weight:700;line-height:1.3}.header-title p{font-size:11px;opacity:.8}
.header-badges{display:flex;gap:8px}
.badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:500;backdrop-filter:blur(8px);display:flex;align-items:center;gap:5px}
.tabs{background:#fff;border-bottom:1px solid var(--primary-100);position:sticky;top:0;z-index:20;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.tabs-inner{max-width:1200px;margin:0 auto;display:flex;gap:2px;padding:0 16px;overflow-x:auto}

.tab-btn:hover{color:#374151;border-bottom-color:#d1d5db}.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
.content{flex:1;max-width:1200px;margin:0 auto;width:100%;padding:16px}
.chat-layout{display:flex;gap:16px;height:calc(100vh - 180px)}
.sidebar{width:260px;background:#fff;border-radius:16px;border:1px solid var(--primary-100);overflow-y:auto;flex-shrink:0}

.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:all .15s;border-radius:10px;margin:3px 8px}
.sidebar-item:hover{background:var(--primary-50)}.sidebar-item .icon{font-size:18px}.sidebar-item .label{font-size:13px;font-weight:500;color:#374151;flex:1}.sidebar-item .count{font-size:10px;color:#9ca3af}

.doc-card-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}.doc-card-top .cat-icon{font-size:13px}.doc-card-top .subcat{font-size:9px;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;font-weight:500}

.doc-card .form-num{display:inline-block;margin-top:5px;font-size:9px;font-weight:700;background:var(--primary-50);color:var(--primary);padding:2px 8px;border-radius:10px}

.chat-hint{text-align:center;font-size:9px;color:#9ca3af;margin-top:6px;padding:0 12px}
.search-bar{max-width:600px;margin:0 auto 20px;position:relative}
.search-bar input{width:100%;border:1px solid var(--primary-200);border-radius:16px;padding:12px 16px 12px 42px;font-size:13px;outline:none;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:all .2s}
.search-bar input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(185,28,28,.1)}

.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.cat-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border-radius:14px;border:1px solid var(--primary-100);background:#fff;cursor:pointer;transition:all .2s;text-align:center}

.cat-card .c-icon{font-size:24px}.cat-card .c-name{font-size:11px;font-weight:600;line-height:1.3}.cat-card .c-count{font-size:9.5px; font-weight: 600;  opacity:.6}
.doc-list{background:#fff;border-radius:16px;border:1px solid var(--primary-100);overflow:hidden}
.doc-list-header{padding:12px 16px;border-bottom:1px solid var(--primary-50);background:var(--primary-50);display:flex;align-items:center;justify-content:space-between}

.doc-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #fef2f2;transition:all .15s;cursor:default}
.doc-row:last-child{border-bottom:none}.doc-row:hover{background:var(--primary-50)}

.doc-row .row-info{flex:1;min-width:0}.doc-row .row-info h4{font-size:13px;font-weight:500;color:#1f2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.row-dl-btn{display:flex;align-items:center;gap:5px;background:var(--primary-50);color:var(--primary);border:none;padding:7px 14px;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;flex-shrink:0}
.row-dl-btn:hover{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(185,28,28,.25)}
.row-dl-btn.done{background:#22c55e;color:#fff}
.empty-state{padding:50px 20px;text-align:center;color:#9ca3af}.empty-state svg{margin:0 auto 12px;opacity:.3}.empty-state p{font-size:13px}.empty-state small{font-size:11px}
.manage-header{background:linear-gradient(135deg,var(--primary-dark),var(--primary),var(--primary-light));border-radius:16px;padding:24px;color:#fff;margin-bottom:20px;position:relative;overflow:hidden}
.manage-header::before{content:'';position:absolute;top:-40%;right:-5%;width:200px;height:200px;background:rgba(255,255,255,.08);border-radius:50%;filter:blur(50px)}
.manage-header .mh-inner{position:relative;z-index:1;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px}
.manage-header h2{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}.manage-header p{font-size:12px;opacity:.8;margin-top:4px}
.add-btn{background:#fff;color:var(--primary);border:none;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.add-btn:hover{background:var(--primary-50);box-shadow:0 4px 16px rgba(0,0,0,.15);transform:translateY(-1px)}.add-btn:active{transform:scale(.97)}
.manage-filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.manage-filters input,.manage-filters select{border:1px solid var(--primary-200);border-radius:12px;padding:10px 14px;font-size:13px;outline:none;background:#fff;transition:all .2s;flex:1;min-width:180px}
.manage-filters input:focus,.manage-filters select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(185,28,28,.1)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid var(--primary-100);border-radius:14px;padding:14px;text-align:center;cursor:pointer;transition:all .2s}
.stat-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06);border-color:var(--primary-200)}
.stat-card.active{border-color:var(--primary);background:var(--primary-50);box-shadow:0 0 0 2px rgba(185,28,28,.1)}
.stat-card .s-icon{font-size:22px}.stat-card .s-num{font-size:20px;font-weight:700;color:#1f2937;margin-top:4px}.stat-card .s-label{font-size:10px;color:#6b7280;margin-top:2px;line-height:1.3}
.manage-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #fef2f2;transition:all .15s}
.manage-row:last-child{border-bottom:none}.manage-row:hover{background:var(--primary-50)}
.manage-row .row-icon{width:40px;height:40px;background:var(--primary-50);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.manage-row .row-info{flex:1;min-width:0}.manage-row .row-info h4{font-size:13px;font-weight:500;color:#1f2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.manage-row .row-info .row-meta span{font-size:10px;color:#9ca3af}
.manage-row .row-info .row-meta .form-tag{font-weight:700;background:var(--primary-50);color:var(--primary);padding:1px 6px;border-radius:4px;font-size:9px}
.manage-row .row-info .row-meta .has-file{font-size:9px;background:#f0fdf4;color:#16a34a;padding:2px 8px;border-radius:4px;font-weight:600}
.row-actions{display:flex;gap:4px;flex-shrink:0}
.act-btn{width:34px;height:34px;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;background:transparent;color:#9ca3af}
.act-btn:hover{transform:scale(1.1)}.act-btn.dl:hover{background:#f0fdf4;color:#16a34a}.act-btn.edit:hover{background:#eff6ff;color:#2563eb}.act-btn.del:hover{background:#fef2f2;color:#dc2626}
.info-box{background:linear-gradient(135deg,var(--primary-50),var(--primary-100));border-radius:16px;padding:20px;border:1px solid var(--primary-200);margin-top:20px}

.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.info-item{display:flex;gap:10px}.info-item .ii-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}

.modal{background:#fff;border-radius:20px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{position:sticky;top:0;z-index:1;background:linear-gradient(135deg,var(--primary-dark),var(--primary),var(--primary-light));color:#fff;padding:16px 24px;border-radius:20px 20px 0 0;display:flex;align-items:center;justify-content:space-between}

.modal-body{padding:24px}
.form-group{margin-bottom:18px}

let documents = [];

// ==================== FIREBASE FUNCTIONS ====================
function loadFromFirebase() {
  documentsRef.on('value', (snapshot) => {
    const data = snapshot.val();
    if (data && Object.keys(data).length > 0) {
      documents = Object.keys(data).map(key => {
        return { ...data[key], id: key };
      });
      console.log('✅ โหลดข้อมูลจาก Firebase:', documents.length, 'รายการ');
    } else {
      console.log('📦 ไม่มีข้อมูลใน Firebase, กำลังเพิ่มข้อมูลเริ่มต้น...');
      documents = [];
      defaultDocuments.forEach(doc => {
        documentsRef.push(doc);
      });
    }
    render();
  }, (error) => {
    console.error('❌ โหลดข้อมูลไม่สำเร็จ:', error);
    showToast('ไม่สามารถเชื่อมต่อ Firebase ได้: ' + error.message, 'error');
  });
}

function addDoc(data) {
  documentsRef.push(data)
    .then(() => showToast('✅ เพิ่มเอกสารสำเร็จ', 'success'))
    .catch((error) => {
      showToast('❌ เพิ่มเอกสารไม่สำเร็จ: ' + error.message, 'error');
      console.error(error);
    });
}

function removeDoc(id) {
  documentsRef.child(id).remove()
    .then(() => showToast('🗑️ ลบเอกสารสำเร็จ', 'info'))
    .catch((error) => {
      showToast('❌ ลบเอกสารไม่สำเร็จ: ' + error.message, 'error');
      console.error(error);
    });
}

function updateDoc(id, data) {
  documentsRef.child(id).set(data)
    .then(() => showToast('✏️ แก้ไขเอกสารสำเร็จ', 'success'))
    .catch((error) => {
      showToast('❌ แก้ไขเอกสารไม่สำเร็จ: ' + error.message, 'error');
      console.error(error);
    });
}

// ==================== UTILITY FUNCTIONS ====================
function getDocsByCat(catId) {
  return documents.filter(d => d.category === catId);
}

function searchDocs(query) {
  if (!query.trim()) return [];
  const lower = query.toLowerCase();
  const words = lower.split(/\s+/).filter(w => w.length > 1);
  return documents.map(doc => {
    let score = 0;
    const text = (doc.name + ' ' + doc.description + ' ' + (doc.keywords||[]).join(' ') + ' ' + doc.category + ' ' + doc.subcategory + ' ' + (doc.formNumber || '')).toLowerCase();
    if (text.includes(lower)) score += 10;
    for (const w of words) {
      if (text.includes(w)) score += 3;
      if ((doc.keywords||[]).some(k => k.toLowerCase().includes(w))) score += 2;
      if (doc.name.toLowerCase().includes(w)) score += 2;
    }
    return { doc, score };
  }).filter(x => x.score > 0).sort((a,b) => b.score - a.score).map(x => x.doc);
}

function getCatInfo(catId) {
  return categories.find(c => c.id === catId) || { icon: '📄', name: 'อื่นๆ' };
}

// ==================== DOWNLOAD ====================
function downloadDoc(doc) {
  if (doc.fileData && doc.fileName) {
    try {
      const byteString = atob(doc.fileData);
      const ab = new ArrayBuffer(byteString.length);
      const ia = new Uint8Array(ab);
      for (let i = 0; i < byteString.length; i++) {
        ia[i] = byteString.charCodeAt(i);
      }
      const blob = new Blob([ab], { type: doc.fileType || 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = doc.fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      return;
    } catch(e) {
      showToast('เกิดข้อผิดพลาดในการดาวน์โหลด', 'error');
      return;
    }
  }
  const content = 'องค์การนักวิชาชีพในอนาคตแห่งประเทศไทย\nวิทยาลัยการอาชีพบ้านโป่ง\n' +
    '─'.repeat(30) + '\n\n' +
    doc.name + '\n' +
    (doc.formNumber ? 'แบบ ' + doc.formNumber + '\n' : '') +
    '\nหมวดหมู่: ' + doc.subcategory +
    '\nรายละเอียด: ' + doc.description +
    '\n\n' + '─'.repeat(30) +
    '\nเอกสารนี้จากระบบจัดการเอกสาร อวท.\nวิทยาลัยการอาชีพบ้านโป่ง จ.ราชบุรี';
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = doc.shortName + '.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

window.handleFileSelect = function(input) {
  const area = document.getElementById('uploadArea');
  const txt = document.getElementById('uploadText');
  if (!area || !txt) return;
  if (input.files && input.files[0]) {
    const file = input.files[0];
    const sizeKB = (file.size / 1024).toFixed(1);
    const sizeMB = (file.size / 1024 / 1024).toFixed(2);
    area.classList.add('attached');
    txt.innerHTML =
      '<div class="up-icon" style="color:#16a34a;opacity:1;font-size:28px">✅</div>' +
      '<p style="color:#16a34a;font-weight:600">แนบไฟล์เรียบร้อยแล้ว!</p>' +
      '<small style="color:#374151">' + file.name + '</small>' +
      '<small style="color:#9ca3af">ขนาด: ' + (file.size > 1024*1024 ? sizeMB + ' MB' : sizeKB + ' KB') + '</small>';
  }
};

function aiResponse(msg) {
  const lower = msg.toLowerCase();
  
  // คำทักทาย
  if (/^(สวัสดี|หวัดดี|ดี|hello|hi|hey)/.test(lower)) {
    return { text: 'สวัสดีค่ะ 😊 ดิฉันเป็นผู้ช่วย AI ของระบบเอกสาร อวท. วิทยาลัยการอาชีพบ้านโป่ง\n\nดิฉันช่วยคุณได้ในเรื่อง:\n• 📜 ระเบียบและแนวปฏิบัติ\n• 📝 แบบฟอร์ม อวท.\n• 📋 คู่มือและแบบประเมิน\n• 🎭 แนวทางการจัดกิจกรรมและพิธีการ\n• 📎 ภาคผนวก\n\nลองถามดิฉันได้เลยค่ะ!', docs: [] };
  }
  
  // ช่วยเหลือ
  if (/ช่วย|ทำอะไรได้|help|วิธีใช้/.test(lower)) {
    return { text: 'ดิฉันช่วยค้นหาเอกสารและแบบฟอร์มของ อวท. ได้ค่ะ! 📚\n\n**วิธีใช้งาน:**\n1. พิมพ์ชื่อแบบฟอร์ม เช่น "ใบสมัครสมาชิก"\n2. พิมพ์ประเภท เช่น "แบบฟอร์ม อวท"\n3. พิมพ์คำเกี่ยวข้อง เช่น "ปม.1" หรือ "พิธีการ"\n\n**หมวดหมู่:**\n📜 ระเบียบและแนวปฏิบัติ\n📝 แบบฟอร์ม อวท.\n📋 คู่มือและแบบประเมิน\n🎭 แนวทางการจัดกิจกรรมและพิธีการ\n📎 ภาคผนวก', docs: [] };
  }
  
  // ดูทั้งหมด
  if (/ทั้งหมด|รายการ|ดูทั้งหมด|all/.test(lower)) {
    return { text: 'มีเอกสารทั้งหมด ' + documents.length + ' รายการค่ะ 📑\nด้านล่างนี้คือตัวอย่างบางส่วน:', docs: documents.slice(0, 6) };
  }
  
  // จับคู่หมวดหมู่ตามคำค้น (ปรับให้ตรงกับ 5 หมวดหมู่)
  const catMap = [
    { re: /ระเบียบ|แนวปฏิบัติ|กฎ|หมวด|คําขวัญ|คติพจน์|ปฏิญาณ|จรรยาบรรณ/, cat: 'regulation', label: '📜 ระเบียบและแนวปฏิบัติ' },
    { re: /อวท\.\d+|แบบฟอร์ม อวท|ใบสมัคร|ทะเบียน|บัญชี|รายงานการประชุม|ระเบียบวาระ|ซ่อมกิจกรรม|ขออนุมัติ|นิเทศ/, cat: 'form_awt', label: '📝 แบบฟอร์ม อวท.' },
    { re: /ปม\.|คู่มือประเมิน|แบบประเมิน|ประเมินองค์การ|ประเมินสมาชิกดีเด่น|ปม\.\d/, cat: 'evaluation', label: '📋 คู่มือและแบบประเมิน' },
    { re: /กิจกรรม|คนดี|คนเก่ง|5 แผน|พิธี|พิธีการ|จุดประกายแสง|Star Vec|เลื่อนระดับ|เปิดประชุม|ปิดประชุม|แข่งขันทักษะ|การประเมินผลกิจกรรม/, cat: 'activity_guide', label: '🎭 แนวทางการจัดกิจกรรมและพิธีการ' },

  ];
  
  for (const cm of catMap) {
    if (cm.re.test(lower)) {
      let docs = searchDocs(msg);
      if (docs.length === 0) docs = getDocsByCat(cm.cat);

  // ค้นหาทั่วไป
  const docs = searchDocs(msg);

}

function sendChat(text) {
  const msg = text || state.chatInput.trim();
  if (!msg) return;
  state.messages.push({ id: 'u-' + Date.now(), role: 'user', text: msg, docs: [], time: new Date() });
  state.chatInput = '';
  state.typing = true;
  render();
  scrollChat();
  setTimeout(() => {
    const res = aiResponse(msg);
    state.messages.push({ id: 'b-' + Date.now(), role: 'bot', text: res.text, docs: res.docs, time: new Date() });
    state.typing = false;
    render();
    scrollChat();
  }, 600 + Math.random() * 500);
}

function scrollChat() {
  setTimeout(() => {
    const el = document.getElementById('chat-end');
    if (el) el.scrollIntoView({ behavior: 'smooth' });
  }, 50);
}

function handleDownload(doc, btnId) {
  downloadDoc(doc);
  state.downloadedIds.add(btnId);
  render();
  setTimeout(() => { state.downloadedIds.delete(btnId); render(); }, 2000);
}

const quickActions = [
  {label:'📜 ระเบียบ อวท.', q:'ระเบียบ อวท'},
  {label:'📝 แบบฟอร์ม อวท.', q:'แบบฟอร์ม อวท'},
  {label:'📋 คู่มือประเมิน', q:'คู่มือประเมิน'},
  {label:'📋 ปม.1', q:'ปม.1'},
  {label:'🎭 พิธีจุดประกายแสง', q:'พิธีจุดประกายแสงแห่งปัญญา'},
  {label:'🎭 กิจกรรมคนดี 5 แผน', q:'กิจกรรมคนดี 5 แผน'},
  {label:'📎 เพลงมาร์ช อวท.', q:'เพลงมาร์ชองค์การ'},
];

function renderDocCard(doc, prefix) {
  const cat = getCatInfo(doc.category);
  const btnId = prefix + doc.id;
  const done = state.downloadedIds.has(btnId);
  const hasFile = doc.fileData && doc.fileName;
  return `<div class="doc-card animate-slide">
    <div class="doc-card-top"><span class="cat-icon">${cat.icon}</span><span class="subcat">${doc.subcategory}</span>${hasFile ? '<span style="margin-left:auto;font-size:9px;background:#f0fdf4;color:#16a34a;padding:2px 7px;border-radius:6px;font-weight:600">📎 มีไฟล์แนบ</span>' : ''}</div>
    <h4>${doc.shortName}</h4>
    <p>${doc.description}</p>
    ${doc.formNumber ? '<span class="form-num">' + doc.formNumber + '</span>' : ''}
    <br><button class="dl-btn ${done ? 'done' : ''}" onclick="handleDownload(documents.find(d=>d.id==='${doc.id}'),\'${btnId}\')">${SVG.download} ${done ? 'สำเร็จ!' : (hasFile ? 'ดาวน์โหลดไฟล์' : 'ดาวน์โหลด')}</button>
  </div>`;
}

function performBrowseSearch() {
  const input = document.getElementById('browseSearchInput');
  if (input) {
    state.browseSearch = input.value;
    state.browseCat = null;
    render();
  }
}

function performManageSearch() {
  const input = document.getElementById('manageSearchInput');
  if (input) {
    state.manageSearch = input.value;
    state.manageCat = null;
    const catSelect = document.getElementById('manageCatSelect');
    if (catSelect) catSelect.value = '';
    render();
  }
}

function render() {
  const app = document.getElementById('app');

  let toastHtml = '';
  if (state.toast) {
    toastHtml = `<div class="toast ${state.toast.type} animate-fade">
      ${state.toast.type === 'success' ? '✅' : state.toast.type === 'error' ? '❌' : 'ℹ️'} ${state.toast.msg}
      <button class="toast-close" onclick="state.toast=null;render()">✕</button>
    </div>`;
  }

  let modalHtml = '';
  if (state.showModal) {
    const ed = state.editDoc;
    const existingFile = ed && ed.fileData && ed.fileName;
    const uploadInitClass = existingFile ? 'attached' : '';
    const uploadInitContent = existingFile
      ? `<div class="up-icon" style="color:#16a34a;opacity:1;font-size:28px">✅</div>
         <p style="color:#16a34a;font-weight:600">มีไฟล์แนบอยู่แล้ว</p>
         <small style="color:#374151">${ed.fileName}</small>
         <small style="color:#9ca3af">คลิกเพื่อเปลี่ยนไฟล์ใหม่</small>`
      : `<div class="up-icon">${SVG.upload}</div><p>คลิกหรือลากไฟล์มาวางที่นี่</p><small>รองรับ PDF, Word, Excel, PowerPoint และไฟล์อื่นๆ</small>`;

    modalHtml = `<div class="modal-overlay animate-fade" onclick="if(event.target===this){state.showModal=false;state.editDoc=null;render()}">
      <div class="modal">
        <div class="modal-header">
          <div class="mh-left">
            <div class="mh-icon">${ed ? '✏️' : '➕'}</div>
            <div><h2>${ed ? 'แก้ไขเอกสาร' : 'เพิ่มเอกสาร/แบบฟอร์มใหม่'}</h2><small>กรอกข้อมูลเอกสารที่ต้องการ${ed ? 'แก้ไข' : 'เพิ่ม'}</small></div>
          </div>
          <button class="modal-close" onclick="state.showModal=false;state.editDoc=null;render()">${SVG.x}</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>📎 แนบไฟล์เอกสาร${ed ? ' (ไม่บังคับ — ถ้าไม่เลือกจะใช้ไฟล์เดิม)' : ' (ถ้ามี)'}</label>
            <div class="upload-area ${uploadInitClass}" id="uploadArea">
              <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip,.rar" onchange="handleFileSelect(this)">
              <div class="upload-text-content" id="uploadText">${uploadInitContent}</div>
            </div>
          </div>
          <div class="form-group">
            <label>ชื่อเอกสาร <span class="req">*</span></label>
            <input type="text" id="f_name" value="${ed ? ed.name.replace(/"/g,'&quot;') : ''}" placeholder="เช่น แบบฟอร์มใบสมัครสมาชิก อวท." required>
          </div>
          <div class="form-group">
            <label>ชื่อย่อ <span class="req">*</span></label>
            <input type="text" id="f_short" value="${ed ? ed.shortName.replace(/"/g,'&quot;') : ''}" placeholder="เช่น ใบสมัครสมาชิก" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>หมวดหมู่ <span class="req">*</span></label>
              <select id="f_cat">
                ${categories.map(c => `<option value="${c.id}" ${ed && ed.category === c.id ? 'selected' : ''}>${c.icon} ${c.name}</option>`).join('')}
              </select>
            </div>
            <div class="form-group">
              <label>หมวดหมู่ย่อย</label>
              <input type="text" id="f_subcat" value="${ed ? ed.subcategory.replace(/"/g,'&quot;') : ''}" placeholder="เช่น สมัครสมาชิก">
            </div>
          </div>
          <div class="form-group">
            <label>รายละเอียด <span class="req">*</span></label>
            <textarea id="f_desc" placeholder="อธิบายเกี่ยวกับเอกสาร/แบบฟอร์มนี้..." required>${ed ? ed.description : ''}</textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>เลขที่แบบฟอร์ม (ถ้ามี)</label>
              <input type="text" id="f_formnum" value="${ed && ed.formNumber ? ed.formNumber : ''}" placeholder="เช่น อวท.3">
            </div>
            <div class="form-group">
              <label>คำค้นหา (Keywords)</label>
              <input type="text" id="f_keywords" value="${ed ? (ed.keywords||[]).join(', ') : ''}" placeholder="คั่นด้วย , เช่น สมัคร, สมาชิก">
              <div class="hint">เพิ่มคำค้นหาเพื่อให้ AI ค้นหาง่ายขึ้น</div>
            </div>
          </div>
          <div class="form-actions">
            <button type="button" onclick="handleFormSubmit()" class="submit-btn">${ed ? '💾 บันทึกการแก้ไข' : '➕ เพิ่มเอกสาร'}</button>
            <button type="button" class="cancel-btn" onclick="state.showModal=false;state.editDoc=null;render()">ยกเลิก</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  let confirmHtml = '';
  if (state.deleteDoc) {
    const safeShort = (state.deleteDoc.shortName || '').replace(/'/g, "\\'");
    confirmHtml = `<div class="modal-overlay animate-fade" onclick="if(event.target===this){state.deleteDoc=null;render()}">
      <div class="confirm-dialog animate-fade">
        <div class="cd-top">
          <div class="cd-icon">${SVG.alert}</div>
          <div><h3>ยืนยันการลบเอกสาร</h3><p>ต้องการลบ "${state.deleteDoc.shortName}" ออกจากระบบหรือไม่?</p></div>
        </div>
        <div class="cd-actions">
          <button class="cd-confirm" onclick="confirmDelete('${state.deleteDoc.id}','${safeShort}')">🗑️ ยืนยันลบ</button>
          <button class="cd-cancel" onclick="state.deleteDoc=null;render()">ยกเลิก</button>
        </div>
      </div>
    </div>`;
  }

  let tabContent = '';

  if (state.tab === 'chat') {
    let msgsHtml = state.messages.map(m => {
      const isUser = m.role === 'user';
      let docsHtml = '';
      if (m.docs && m.docs.length > 0) {
        docsHtml = '<div class="msg-docs">' + m.docs.map(d => renderDocCard(d, 'chat-')).join('') + '</div>';
      }
      return `<div class="msg ${isUser ? 'user' : ''} animate-slide">
        <div class="msg-avatar ${isUser ? 'usr' : 'bot'}">${isUser ? '👤' : '<img src="bot.png" class="msg-avatar-img">'}</div>
        <div>
          <div class="msg-bubble ${isUser ? 'usr' : 'bot'}">${formatText(m.text)}</div>
          ${docsHtml}
          <div class="msg-time">${formatTime(m.time)}</div>
        </div>
      </div>`;
    }).join('');

    if (state.typing) {
      msgsHtml += `<div class="msg animate-slide"><div class="msg-avatar bot">🤖</div><div class="msg-bubble bot"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>`;
    }
    msgsHtml += '<div id="chat-end"></div>';

    let quickHtml = '';
    if (state.messages.length <= 1) {
      quickHtml = '<div class="quick-actions">' + quickActions.map(a => `<button class="quick-btn" onclick="sendChat(\'${a.q}\')">${a.label}</button>`).join('') + '</div>';
    }

    const sidebarHtml = `<div class="sidebar">
      <div class="sidebar-header">${SVG.folder} หมวดหมู่เอกสาร</div>
      <div style="padding:6px">
        ${categories.map(c => {
          const count = getDocsByCat(c.id).length;
          return `<div class="sidebar-item" onclick="sendChat('${c.name}')">
            <span class="icon">${c.icon}</span>
            <span class="label">${c.name}</span>
            <span class="count">${count}</span>
          </div>`;
        }).join('')}
      </div>
      <div class="sidebar-tip">
        <div class="tip-title">💡 แนะนำ</div>
        <p>พิมพ์ "ช่วย" เพื่อดูวิธีใช้ หรือพิมพ์ชื่อแบบฟอร์มที่ต้องการค้นหา</p>
      </div>
    </div>`;

    tabContent = `<div class="chat-layout">
      ${sidebarHtml}
      <div class="chat-main">
        <div class="chat-messages" id="chatMessages">${msgsHtml}</div>
        ${quickHtml}
        <div class="chat-input">
          <input type="text" id="chatInput" value="${state.chatInput.replace(/"/g,'&quot;')}" placeholder="พิมพ์ค้นหาแบบฟอร์มที่ต้องการ..." oninput="state.chatInput=this.value" onkeydown="if(event.key==='Enter'){event.preventDefault();sendChat()}">
          <button class="send-btn" onclick="sendChat()" ${state.typing ? 'disabled' : ''}>${SVG.send}</button>
        </div>
        <div class="chat-hint">เอกสาร อวท. — ดาวน์โหลดเฉพาะฟอร์มที่ต้องการ ไม่ต้องโหลดทั้งเล่ม</div>
      </div>
    </div>`;

  } else if (state.tab === 'browse') {
    let filtered = documents;
    if (state.browseCat) {
      filtered = getDocsByCat(state.browseCat);
    } else if (state.browseSearch) {
      const s = state.browseSearch.toLowerCase();
      filtered = documents.filter(d => (d.name + d.description + (d.keywords||[]).join(' ')).toLowerCase().includes(s));
    }

    let listHtml = '';
    if (filtered.length === 0) {
      listHtml = `<div class="empty-state">${SVG.search}<p>ไม่พบเอกสารที่ตรงกับคำค้นหา</p><small>ลองค้นหาด้วยคำอื่น</small></div>`;
    } else {
      listHtml = filtered.map(doc => {
        const cat = getCatInfo(doc.category);
        const btnId = 'browse-' + doc.id;
        const done = state.downloadedIds.has(btnId);
        const hasFile = doc.fileData && doc.fileName;
        return `<div class="doc-row">
          <div class="row-icon">${cat.icon}</div>
          <div class="row-info">
            <h4>${doc.name}</h4>
            <div class="row-meta">
              <span>${doc.subcategory}</span>
              ${doc.formNumber ? '<span class="form-tag">' + doc.formNumber + '</span>' : ''}
              ${hasFile ? '<span style="font-size:9px;background:#f0fdf4;color:#16a34a;padding:2px 7px;border-radius:4px;font-weight:600">📎 มีไฟล์แนบ</span>' : ''}
            </div>
          </div>
          <button class="row-dl-btn ${done ? 'done' : ''}" onclick="handleDownload(documents.find(d=>d.id==='${doc.id}'),'${btnId}')">${SVG.download} ${done ? 'สำเร็จ!' : (hasFile ? 'ดาวน์โหลดไฟล์' : 'ดาวน์โหลด')}</button>
        </div>`;
      }).join('');
    }

    const headerLabel = state.browseCat
      ? categories.find(c=>c.id===state.browseCat)?.name
      : state.browseSearch ? 'ผลการค้นหา "'+state.browseSearch+'"' : 'เอกสารทั้งหมด';

    tabContent = `
      <div class="search-bar">
        ${SVG.search}
        <input type="text" id="browseSearchInput" value="${state.browseSearch.replace(/"/g,'&quot;')}" placeholder="ค้นหาเอกสารและแบบฟอร์ม..." onkeydown="if(event.key==='Enter'){event.preventDefault();performBrowseSearch()}">
        <button style="position:absolute; right:5px; top:50%; transform:translateY(-50%); background:var(--primary); color:white; border:none; padding:6px 12px; border-radius:8px; cursor:pointer; font-size:12px;" onclick="performBrowseSearch()">ค้นหา</button>
      </div>
      <div class="cat-grid">
        <div class="cat-card ${!state.browseCat && !state.browseSearch ? 'active' : ''}" onclick="state.browseCat=null;state.browseSearch='';document.getElementById('browseSearchInput').value='';render()">
          <span class="c-icon">📚</span><span class="c-name">ทั้งหมด</span><span class="c-count">${documents.length} รายการ</span>
        </div>
        ${categories.map(c => {
          const cnt = getDocsByCat(c.id).length;
          return `<div class="cat-card ${state.browseCat===c.id?'active':''}" onclick="state.browseCat=state.browseCat==='${c.id}'?null:'${c.id}';state.browseSearch='';document.getElementById('browseSearchInput').value='';render()">
            <span class="c-icon">${c.icon}</span><span class="c-name">${c.name}</span><span class="c-count">${cnt} รายการ</span>
          </div>`;
        }).join('')}
      </div>
      <div class="doc-list">
        <div class="doc-list-header"><h3>${SVG.file} ${headerLabel} <span>(${filtered.length} รายการ)</span></h3></div>
        ${listHtml}
      </div>`;

  } else if (state.tab === 'manage') {
    let filtered = documents;
    if (state.manageCat) {
      filtered = documents.filter(d => d.category === state.manageCat);
    } else if (state.manageSearch) {
      const s = state.manageSearch.toLowerCase();
      filtered = documents.filter(d => (d.name + d.shortName + d.description).toLowerCase().includes(s));
    }

    let listHtml = '';
    if (filtered.length === 0) {
      listHtml = `<div class="empty-state">${SVG.file}<p>ไม่พบเอกสาร</p><small>ลองค้นหาด้วยคำอื่น หรือเพิ่มเอกสารใหม่</small><br><br><button class="add-btn" onclick="state.editDoc=null;state.showModal=true;render()" style="margin:0 auto">${SVG.plus} เพิ่มเอกสารใหม่</button></div>`;
    } else {
      listHtml = filtered.map(doc => {
        const cat = getCatInfo(doc.category);
        const hasFile = doc.fileData && doc.fileName;
        const safeId = doc.id.replace(/'/g, "\\'");
        return `<div class="manage-row">
          <div class="row-icon">${cat.icon}</div>
          <div class="row-info">
            <h4>${doc.name}</h4>
            <div class="row-meta">
              <span class="cat-tag">${cat.name}</span>
              <span>${doc.subcategory}</span>
              ${doc.formNumber ? '<span class="form-tag">' + doc.formNumber + '</span>' : ''}
              ${hasFile ? '<span class="has-file">📎 ' + doc.fileName + '</span>' : ''}
            </div>
          </div>
          <div class="row-actions">
            <button class="act-btn dl" title="ดาวน์โหลด" onclick="downloadDoc(documents.find(d=>d.id==='${safeId}'))">${SVG.download}</button>
            <button class="act-btn edit" title="แก้ไข" onclick="state.editDoc=documents.find(d=>d.id==='${safeId}');state.showModal=true;render()">${SVG.edit}</button>
            <button class="act-btn del" title="ลบ" onclick="state.deleteDoc=documents.find(d=>d.id==='${safeId}');render()">${SVG.trash}</button>
          </div>
        </div>`;
      }).join('');
    }

    tabContent = `
      <div class="manage-header">
        <div class="mh-inner">
          <div><h2>⚙️ จัดการเอกสารและแบบฟอร์ม</h2><p>เพิ่ม แก้ไข หรือลบเอกสาร/แบบฟอร์มในระบบ — ทั้งหมด ${documents.length} รายการ</p></div>
          <button class="add-btn" onclick="state.editDoc=null;state.showModal=true;render()">${SVG.plus} เพิ่มเอกสารใหม่</button>
        </div>
      </div>
      <div class="manage-filters">
        <div style="display:flex; gap:5px; flex:1;">
          <input type="text" id="manageSearchInput" value="${state.manageSearch.replace(/"/g,'&quot;')}" placeholder="🔍 ค้นหาเอกสาร..." style="flex:1;" onkeydown="if(event.key==='Enter'){event.preventDefault();performManageSearch()}">
          <button style="background:var(--primary); color:white; border:none; padding:0 15px; border-radius:12px; cursor:pointer; font-weight:600;" onclick="performManageSearch()">ค้นหา</button>
        </div>
        <select id="manageCatSelect" onchange="state.manageCat=this.value||null;state.manageSearch='';document.getElementById('manageSearchInput').value='';render()">
          <option value="">ทุกหมวดหมู่</option>
          ${categories.map(c => `<option value="${c.id}" ${state.manageCat===c.id?'selected':''}>${c.icon} ${c.name}</option>`).join('')}
        </select>
      </div>
      <div class="stats-grid">
        ${categories.map(c => {
          const cnt = documents.filter(d=>d.category===c.id).length;
          return `<div class="stat-card ${state.manageCat===c.id?'active':''}" onclick="state.manageCat=state.manageCat==='${c.id}'?null:'${c.id}';state.manageSearch='';document.getElementById('manageSearchInput').value='';document.getElementById('manageCatSelect').value='${state.manageCat===c.id ? '' : c.id}';render()">
            <div class="s-icon">${c.icon}</div><div class="s-num">${cnt}</div><div class="s-label">${c.name}</div>
          </div>`;
        }).join('')}
      </div>

// ==================== FORM SUBMIT ====================
window.handleFormSubmit = function() {
  const name = document.getElementById('f_name').value.trim();
  const shortName = document.getElementById('f_short').value.trim();
  const category = document.getElementById('f_cat').value;
  const subcategory = document.getElementById('f_subcat').value.trim() || getCatInfo(category).name;
  const description = document.getElementById('f_desc').value.trim();
  const formNumber = document.getElementById('f_formnum').value.trim() || undefined;
  const keywords = document.getElementById('f_keywords').value
    .split(',').map(k => k.trim()).filter(k => k.length > 0);

  if (!name || !shortName || !description) {
    showToast('กรุณากรอกข้อมูลที่จำเป็นให้ครบ', 'error');
    return;
  }

  const fileInput = document.getElementById('fileInput');
  const file = fileInput && fileInput.files && fileInput.files[0];

  const saveData = (fileData, fileName, fileType) => {
    const data = { name, shortName, category, subcategory, description, keywords, formNumber, fileData, fileName, fileType };
    if (state.editDoc) {
      updateDoc(state.editDoc.id, data);
    } else {
      addDoc(data);
    }
    state.showModal = false;
    state.editDoc = null;
    render();
  };

  if (file) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const base64 = ev.target.result.split(',')[1];
      saveData(base64, file.name, file.type);
    };
    reader.onerror = () => {
      showToast('ไม่สามารถอ่านไฟล์ได้ กรุณาลองใหม่', 'error');
    };
    reader.readAsDataURL(file);
  } else {
    const prev = state.editDoc;
    saveData(prev ? prev.fileData : undefined, prev ? prev.fileName : undefined, prev ? prev.fileType : undefined);
  }
};

// ==================== DELETE CONFIRM ====================
window.confirmDelete = function(id, shortName) {
  removeDoc(id);
  state.deleteDoc = null;
  render();
};

loadFromFirebase();
