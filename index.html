<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>อวท. วิทยาลัยการอาชีพบ้านโป่ง | ระบบจัดการเอกสาร (ครบทุกหมวด)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Noto Sans Thai',sans-serif}
:root{--primary:#b91c1c;--primary-light:#dc2626;--primary-dark:#7f1d1d;--primary-50:#fef2f2;--primary-100:#fee2e2;--primary-200:#fecaca;--primary-bg:linear-gradient(135deg,#fef2f2 0%,#ffffff 50%,#fef2f2 100%)}
body{background:var(--primary-bg);min-height:100vh;color:#1f2937}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#e5a0a0;border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--primary)}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes pulseDot{0%,80%,100%{transform:scale(0);opacity:.5}40%{transform:scale(1);opacity:1}}
.animate-slide{animation:slideUp .3s ease-out}.animate-fade{animation:fadeIn .25s ease-out}
.dot{width:7px;height:7px;border-radius:50%;background:var(--primary);opacity:.5;animation:pulseDot 1.4s infinite ease-in-out both;display:inline-block}
.dot:nth-child(1){animation-delay:-.32s}.dot:nth-child(2){animation-delay:-.16s}.dot:nth-child(3){animation-delay:0s}
.app{display:flex;flex-direction:column;min-height:100vh}
header{background:linear-gradient(135deg,#510606, #6d1111, #410303);color:#fff;padding:12px 16px;position:relative;overflow:hidden}
header::before{content:'';position:absolute;top:-50%;left:20%;width:300px;height:300px;background:rgba(255,255,255,.08);border-radius:50%;filter:blur(60px)}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:relative;z-index:1}
.header-left{display:flex;align-items:center;gap:12px}
.logo{width:55px;height:55px;border-radius:50%;overflow:hidden;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2);background:#fff;display:flex;align-items:center;justify-content:center}
.logo img{width:100%;height:100%;object-fit:cover}
.header-title h1{font-size:1.5rem;font-weight:700;line-height:1.3}.header-title p{font-size:11px;opacity:.8}
.header-badges{display:flex;gap:8px}
.badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:500;backdrop-filter:blur(8px);display:flex;align-items:center;gap:5px}
.tabs{background:#fff;border-bottom:1px solid var(--primary-100);position:sticky;top:0;z-index:20;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.tabs-inner{max-width:1200px;margin:0 auto;display:flex;gap:2px;padding:0 16px;overflow-x:auto}
.tab-btn{padding:12px 18px;font-size:13px;font-weight:500;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;color:#6b7280;display:flex;align-items:center;gap:7px;white-space:nowrap;transition:all .2s}
.tab-btn:hover{color:#374151;border-bottom-color:#d1d5db}.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
.content{flex:1;max-width:1200px;margin:0 auto;width:100%;padding:16px}
.chat-layout{display:flex;gap:16px;height:calc(100vh - 180px)}
.sidebar{width:260px;background:#fff;border-radius:16px;border:1px solid var(--primary-100);overflow-y:auto;flex-shrink:0}
.sidebar-header{padding:14px 16px;border-bottom:1px solid var(--primary-50);font-weight:700;font-size:14px;color:#374151;display:flex;align-items:center;gap:8px;position:sticky;top:0;background:#fff;z-index:1;border-radius:16px 16px 0 0}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:all .15s;border-radius:10px;margin:3px 8px}
.sidebar-item:hover{background:var(--primary-50)}.sidebar-item .icon{font-size:18px}.sidebar-item .label{font-size:13px;font-weight:500;color:#374151;flex:1}.sidebar-item .count{font-size:10px;color:#9ca3af}
.sidebar-tip{margin:10px;background:linear-gradient(135deg,var(--primary-50),var(--primary-100));border-radius:12px;padding:12px;border:1px solid var(--primary-200)}
.sidebar-tip p{font-size:11px;color:#6b7280;line-height:1.5}.sidebar-tip .tip-title{font-size:11px;font-weight:600;color:#374151;margin-bottom:4px}
.chat-main{flex:1;display:flex;flex-direction:column;background:#fff;border-radius:16px;border:1px solid var(--primary-100);overflow:hidden}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.msg{display:flex;gap:10px;max-width:88%}.msg.user{flex-direction:row-reverse;margin-left:auto}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.msg-avatar.bot{
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background-color: #f0f0f0;
  flex-shrink: 0;
}

.msg-avatar-img {
  width: 100%;
  height: 100%;
  object-fit: cover; /* หรือใช้ contain */
  object-position: center;
  image-rendering: -webkit-optimize-contrast; /* ทำให้คมชัด */
  image-rendering: crisp-edges; /* สำหรับ firefox */
  image-rendering: pixelated; /* สำหรับรูป pixel art */
  image-rendering: auto;
}

/* ถ้าต้องการให้รูปเต็มพื้นที่โดยไม่ตัด */
.msg-avatar-img {
  width: 100%;
  height: 100%;
  object-fit: contain; /* รูปไม่ตัด แต่มีขอบ */
  background-color: #f0f0f0;
}
.msg-bubble{border-radius:16px;padding:12px 16px;font-size:13px;line-height:1.7;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.msg-bubble.bot{background:var(--primary-50);border:1px solid var(--primary-100);border-top-left-radius:4px}
.msg-bubble.usr{background:#f3f4f6;border:1px solid #e5e7eb;border-top-right-radius:4px}
.msg-time{font-size:9px;color:#9ca3af;margin-top:4px;padding:0 4px}
.msg-docs{margin-top:8px;display:flex;flex-direction:column;gap:8px}
.doc-card{background:#fff;border:1px solid var(--primary-100);border-radius:12px;padding:12px;transition:all .2s}
.doc-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.08);border-color:var(--primary-200)}
.doc-card-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}.doc-card-top .cat-icon{font-size:13px}.doc-card-top .subcat{font-size:9px;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.doc-card h4{font-size:13px;font-weight:600;color:#1f2937;line-height:1.4;margin-bottom:4px}.doc-card p{font-size:11px;color:#6b7280;line-height:1.4}
.doc-card .form-num{display:inline-block;margin-top:5px;font-size:9px;font-weight:700;background:var(--primary-50);color:var(--primary);padding:2px 8px;border-radius:10px}
.doc-card .dl-btn{margin-top:8px;display:inline-flex;align-items:center;gap:5px;background:var(--primary-50);color:var(--primary);border:none;padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
.doc-card .dl-btn:hover{background:var(--primary);color:#fff}
.doc-card .dl-btn.done{background:#22c55e;color:#fff}
.quick-actions{padding:6px 16px 10px;display:flex;flex-wrap:wrap;gap:6px}
.quick-btn{font-size:11px;background:linear-gradient(135deg,var(--primary-50),var(--primary-100));color:var(--primary);border:1px solid var(--primary-200);padding:7px 14px;border-radius:20px;cursor:pointer;font-weight:500;transition:all .2s}
.quick-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 8px rgba(185,28,28,.25)}
.chat-input{border-top:1px solid var(--primary-50);padding:12px;background:var(--primary-50);display:flex;gap:8px;align-items:center}
.chat-input input{flex:1;border:1px solid var(--primary-200);border-radius:12px;padding:10px 16px;font-size:13px;outline:none;transition:all .2s;background:#fff}
.chat-input input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(185,28,28,.1)}
.chat-input input::placeholder{color:#9ca3af}
.send-btn{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border:none;width:42px;height:42px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.send-btn:hover{box-shadow:0 3px 12px rgba(185,28,28,.35);transform:scale(1.05)}.send-btn:active{transform:scale(.95)}.send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.chat-hint{text-align:center;font-size:9px;color:#9ca3af;margin-top:6px;padding:0 12px}
.search-bar{max-width:600px;margin:0 auto 20px;position:relative}
.search-bar input{width:100%;border:1px solid var(--primary-200);border-radius:16px;padding:12px 16px 12px 42px;font-size:13px;outline:none;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:all .2s}
.search-bar input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(185,28,28,.1)}
.search-bar svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#9ca3af}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.cat-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border-radius:14px;border:1px solid var(--primary-100);background:#fff;cursor:pointer;transition:all .2s;text-align:center}
.cat-card:hover{border-color:var(--primary-200);background:var(--primary-50);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.cat-card.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 3px 12px rgba(185,28,28,.25)}
.cat-card .c-icon{font-size:24px}.cat-card .c-name{font-size:11px;font-weight:600;line-height:1.3}.cat-card .c-count{font-size:9.5px;font-weight:600;opacity:.6}
.doc-list{background:#fff;border-radius:16px;border:1px solid var(--primary-100);overflow:hidden}
.doc-list-header{padding:12px 16px;border-bottom:1px solid var(--primary-50);background:var(--primary-50);display:flex;align-items:center;justify-content:space-between}
.doc-list-header h3{font-size:13px;font-weight:600;color:#374151;display:flex;align-items:center;gap:8px}
.doc-list-header h3 span{font-size:11px;font-weight:400;color:#9ca3af}
.doc-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #fef2f2;transition:all .15s;cursor:default}
.doc-row:last-child{border-bottom:none}.doc-row:hover{background:var(--primary-50)}
.doc-row .row-icon{width:40px;height:40px;background:var(--primary-50);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.doc-row .row-info{flex:1;min-width:0}.doc-row .row-info h4{font-size:13px;font-weight:500;color:#1f2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-row .row-info .row-meta{display:flex;align-items:center;gap:8px;margin-top:3px}
.doc-row .row-info .row-meta span{font-size:10px;color:#9ca3af}
.doc-row .row-info .row-meta .form-tag{font-weight:700;background:var(--primary-50);color:var(--primary);padding:1px 6px;border-radius:4px}
.row-dl-btn{display:flex;align-items:center;gap:5px;background:var(--primary-50);color:var(--primary);border:none;padding:7px 14px;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;flex-shrink:0}
.row-dl-btn:hover{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(185,28,28,.25)}
.row-dl-btn.done{background:#22c55e;color:#fff}
.empty-state{padding:50px 20px;text-align:center;color:#9ca3af}.empty-state svg{margin:0 auto 12px;opacity:.3}.empty-state p{font-size:13px}.empty-state small{font-size:11px}
.manage-header{background:linear-gradient(135deg,var(--primary-dark),var(--primary),var(--primary-light));border-radius:16px;padding:24px;color:#fff;margin-bottom:20px;position:relative;overflow:hidden}
.manage-header::before{content:'';position:absolute;top:-40%;right:-5%;width:200px;height:200px;background:rgba(255,255,255,.08);border-radius:50%;filter:blur(50px)}
.manage-header .mh-inner{position:relative;z-index:1;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px}
.manage-header h2{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}.manage-header p{font-size:12px;opacity:.8;margin-top:4px}
.add-btn{background:#fff;color:var(--primary);border:none;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.add-btn:hover{background:var(--primary-50);box-shadow:0 4px 16px rgba(0,0,0,.15);transform:translateY(-1px)}.add-btn:active{transform:scale(.97)}
.manage-filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.manage-filters input,.manage-filters select{border:1px solid var(--primary-200);border-radius:12px;padding:10px 14px;font-size:13px;outline:none;background:#fff;transition:all .2s;flex:1;min-width:180px}
.manage-filters input:focus,.manage-filters select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(185,28,28,.1)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid var(--primary-100);border-radius:14px;padding:14px;text-align:center;cursor:pointer;transition:all .2s}
.stat-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06);border-color:var(--primary-200)}
.stat-card.active{border-color:var(--primary);background:var(--primary-50);box-shadow:0 0 0 2px rgba(185,28,28,.1)}
.stat-card .s-icon{font-size:22px}.stat-card .s-num{font-size:20px;font-weight:700;color:#1f2937;margin-top:4px}.stat-card .s-label{font-size:10px;color:#6b7280;margin-top:2px;line-height:1.3}
.manage-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #fef2f2;transition:all .15s}
.manage-row:last-child{border-bottom:none}.manage-row:hover{background:var(--primary-50)}
.manage-row .row-icon{width:40px;height:40px;background:var(--primary-50);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.manage-row .row-info{flex:1;min-width:0}.manage-row .row-info h4{font-size:13px;font-weight:500;color:#1f2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.manage-row .row-info .row-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap}
.manage-row .row-info .row-meta .cat-tag{font-size:9px;color:#fff;background:var(--primary);padding:2px 8px;border-radius:4px;font-weight:500}
.manage-row .row-info .row-meta span{font-size:10px;color:#9ca3af}
.manage-row .row-info .row-meta .form-tag{font-weight:700;background:var(--primary-50);color:var(--primary);padding:1px 6px;border-radius:4px;font-size:9px}
.manage-row .row-info .row-meta .has-file{font-size:9px;background:#f0fdf4;color:#16a34a;padding:2px 8px;border-radius:4px;font-weight:600}
.row-actions{display:flex;gap:4px;flex-shrink:0}
.act-btn{width:34px;height:34px;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;background:transparent;color:#9ca3af}
.act-btn:hover{transform:scale(1.1)}.act-btn.dl:hover{background:#f0fdf4;color:#16a34a}.act-btn.edit:hover{background:#eff6ff;color:#2563eb}.act-btn.del:hover{background:#fef2f2;color:#dc2626}
.info-box{background:linear-gradient(135deg,var(--primary-50),var(--primary-100));border-radius:16px;padding:20px;border:1px solid var(--primary-200);margin-top:20px}
.info-box h4{font-size:13px;font-weight:700;color:#374151;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.info-item{display:flex;gap:10px}.info-item .ii-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.info-item .ii-icon.add{background:var(--primary-50);color:var(--primary)}.info-item .ii-icon.edit-i{background:#eff6ff;color:#2563eb}.info-item .ii-icon.del-i{background:#fef2f2;color:#dc2626}
.info-item p{font-size:11px;font-weight:600;color:#374151}.info-item small{font-size:10px;color:#6b7280;line-height:1.4;display:block;margin-top:2px}
.modal-overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,.5);backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:20px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{position:sticky;top:0;z-index:1;background:linear-gradient(135deg,var(--primary-dark),var(--primary),var(--primary-light));color:#fff;padding:16px 24px;border-radius:20px 20px 0 0;display:flex;align-items:center;justify-content:space-between}
.modal-header .mh-left{display:flex;align-items:center;gap:12px}
.modal-header .mh-icon{width:40px;height:40px;background:rgba(255,255,255,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px}
.modal-header h2{font-size:16px;font-weight:700}.modal-header small{font-size:10px;opacity:.7;display:block;margin-top:2px}
.modal-close{background:none;border:none;color:#fff;cursor:pointer;padding:8px;border-radius:8px;transition:all .15s;font-size:18px}.modal-close:hover{background:rgba(255,255,255,.2)}
.modal-body{padding:24px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
.form-group label .req{color:#dc2626}
.form-group input,.form-group select,.form-group textarea{width:100%;border:1px solid var(--primary-200);border-radius:12px;padding:10px 14px;font-size:13px;outline:none;transition:all .2s;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(185,28,28,.1)}
.form-group input::placeholder,.form-group textarea::placeholder{color:#9ca3af}
.form-group textarea{resize:none;min-height:80px}
.form-group .hint{font-size:10px;color:#9ca3af;margin-top:4px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.upload-area{border:2px dashed var(--primary-200);border-radius:14px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;position:relative;background:var(--primary-50)}
.upload-area:hover{border-color:var(--primary);background:var(--primary-100)}
.upload-area input{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}
.upload-area .up-icon{font-size:28px;opacity:.4;margin-bottom:6px}.upload-area p{font-size:12px;color:#6b7280}.upload-area small{font-size:10px;color:#9ca3af}
.upload-area.attached{border-color:#86efac;background:#f0fdf4;border-style:solid}
.upload-area.attached .up-icon{color:#16a34a;opacity:1}
.upload-text-content{pointer-events:none}
.form-actions{display:flex;gap:10px;margin-top:20px}
.form-actions .submit-btn{flex:1;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border:none;padding:12px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.form-actions .submit-btn:hover{box-shadow:0 4px 16px rgba(185,28,28,.3);transform:translateY(-1px)}.form-actions .submit-btn:active{transform:scale(.98)}
.form-actions .cancel-btn{padding:12px 24px;border-radius:12px;border:1px solid var(--primary-200);background:none;color:#6b7280;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.form-actions .cancel-btn:hover{background:var(--primary-50)}
.confirm-dialog{background:#fff;border-radius:20px;width:100%;max-width:420px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.confirm-dialog .cd-top{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.confirm-dialog .cd-icon{width:48px;height:48px;background:#fef2f2;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#dc2626;font-size:22px;flex-shrink:0}
.confirm-dialog h3{font-weight:700;color:#1f2937;font-size:15px}.confirm-dialog p{font-size:12px;color:#6b7280;margin-top:2px}

function showToast(msg, type) {
  if (state.toastTimer) clearTimeout(state.toastTimer);
  state.toast = { msg, type };
  state.toastTimer = setTimeout(() => { state.toast = null; render(); }, 3500);
  render();
}

function formatTime(d) { return d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }); }
function formatText(text) { return text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>'); }

function getDocsByCat(catId) { return documents.filter(d => d.category === catId); }
function getCatInfo(catId) { return categories.find(c => c.id === catId) || { icon: '📄', name: 'อื่นๆ' }; }

function searchDocs(query) {
  if (!query.trim()) return [];
  const lower = query.toLowerCase();
  return documents.filter(doc => {
    const text = (doc.name + ' ' + doc.description + ' ' + (doc.keywords||[]).join(' ') + ' ' + doc.subcategory + ' ' + (doc.formNumber || '')).toLowerCase();
    return text.includes(lower);
  });
}

function downloadDoc(doc) {
  if (doc.fileData && doc.fileName) {
    try {
      const byteString = atob(doc.fileData);
      const ab = new ArrayBuffer(byteString.length);
      const ia = new Uint8Array(ab);
      for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
      const blob = new Blob([ab], { type: doc.fileType || 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = doc.fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      return;
    } catch(e) { showToast('ดาวน์โหลดผิดพลาด', 'error'); }
  }
  const content = 'องค์การนักวิชาชีพในอนาคตแห่งประเทศไทย\nวิทยาลัยการอาชีพบ้านโป่ง\n' + '─'.repeat(30) + '\n\n' + doc.name + '\n' + (doc.formNumber ? 'แบบ ' + doc.formNumber + '\n' : '') + '\nหมวดหมู่: ' + doc.subcategory + '\nรายละเอียด: ' + doc.description + '\n\n' + '─'.repeat(30) + '\nเอกสารจากระบบ อวท.';
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = doc.shortName + '.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function loadFromFirebase() {
  documentsRef.on('value', (snapshot) => {
    const data = snapshot.val();
    if (data && Object.keys(data).length > 0) {
      documents = Object.keys(data).map(key => ({ ...data[key], id: key }));
      console.log('✅ โหลด:', documents.length, 'รายการ');
    } else {
      console.log('📦 เพิ่มข้อมูลเริ่มต้น...');
      documents = [];
      defaultDocuments.forEach(doc => documentsRef.push(doc));
    }
    render();
  }, (error) => { showToast('เชื่อมต่อ Firebase ไม่ได้', 'error'); });
}

function addDoc(data) { documentsRef.push(data).then(() => showToast('✅ เพิ่มสำเร็จ', 'success')); }
function removeDoc(id) { documentsRef.child(id).remove().then(() => showToast('🗑️ ลบสำเร็จ', 'info')); }
function updateDoc(id, data) { documentsRef.child(id).set(data).then(() => showToast('✏️ แก้ไขสำเร็จ', 'success')); }

// ==================== AI RESPONSE ====================
function aiResponse(msg) {
  const lower = msg.toLowerCase();
  if (/^(สวัสดี|หวัดดี|hello|hi)/.test(lower)) {
    return { text: 'สวัสดีค่ะ 😊 ดิฉันผู้ช่วยค้นหาเอกสาร อวท.\n\nพิมพ์คำค้น เช่น "อวท.10", "ปม.1", "ระเบียบ อวท"', docs: [] };
  }
  if (/ช่วย|วิธีใช้|help/.test(lower)) {
    return { text: 'วิธีใช้: พิมพ์ชื่อเอกสารที่ต้องการ เช่น "ใบสมัครสมาชิก", "อวท.10", "ปม.1"', docs: [] };
  }
  if (/ทั้งหมด|รายการ/.test(lower)) {
    return { text: `มีเอกสารทั้งหมด ${documents.length} รายการ`, docs: documents.slice(0, 6) };
  }
  const catMap = [
    { re: /ระเบียบ|แนวปฏิบัติ|กฎ|คำขวัญ|ตราสัญลักษณ์/, cat: 'regulation', label: '📜 ระเบียบและแนวปฏิบัติ' },
    { re: /อวท\.\d+|แบบฟอร์ม|ใบสมัคร|ทะเบียน|บัญชี|รายงาน|ซ่อม|ขออนุมัติ|นิเทศ|ดีเด่น/, cat: 'form_awt', label: '📝 แบบฟอร์ม อวท.' },
    { re: /ปม\.|คู่มือประเมิน|แบบประเมิน|ประเมินองค์การ|ประเมินสมาชิก/, cat: 'evaluation', label: '📋 คู่มือและแบบประเมิน' },
    { re: /กิจกรรม|คนดี|คนเก่ง|5 แผน|พิธี|จุดประกายแสง|Star Vec|เลื่อนระดับ|หน้าเสาธง|แข่งขัน/, cat: 'activity_guide', label: '🎭 แนวทางจัดกิจกรรมและพิธีการ' },
    { re: /ภาคผนวก|คณะผู้จัดทำ|เพลง|มาร์ช|ชาวอวท/, cat: 'appendix', label: '📎 ภาคผนวก' },
  ];
  for (const cm of catMap) {
    if (cm.re.test(lower)) {
      let docs = searchDocs(msg);
      if (docs.length === 0) docs = getDocsByCat(cm.cat);
      return { text: cm.label + ' — พบ ' + docs.length + ' รายการ', docs: docs.slice(0, 8) };
    }
  }
  const docs = searchDocs(msg);
  if (docs.length > 0) return { text: `🔍 พบ ${docs.length} รายการ`, docs: docs.slice(0, 8) };
  return { text: 'ไม่พบเอกสาร ลองพิมพ์ "ทั้งหมด" เพื่อดูรายการ', docs: [] };
}

function sendChat(text) {
  const msg = text || state.chatInput.trim();
  if (!msg) return;
  state.messages.push({ id: 'u-' + Date.now(), role: 'user', text: msg, docs: [], time: new Date() });
  state.chatInput = '';
  state.typing = true;
  render();
  setTimeout(() => {
    const res = aiResponse(msg);
    state.messages.push({ id: 'b-' + Date.now(), role: 'bot', text: res.text, docs: res.docs, time: new Date() });
    state.typing = false;
    render();
    document.getElementById('chat-end')?.scrollIntoView({ behavior: 'smooth' });
  }, 500);
}

function handleDownload(doc, btnId) {
  downloadDoc(doc);
  state.downloadedIds.add(btnId);
  render();
  setTimeout(() => { state.downloadedIds.delete(btnId); render(); }, 2000);
}

      if (m.docs && m.docs.length > 0) docsHtml = '<div class="msg-docs">' + m.docs.map(d => renderDocCard(d, 'chat-')).join('') + '</div>';
      return `<div class="msg ${isUser ? 'user' : ''} animate-slide">
        <div class="msg-avatar ${isUser ? 'usr' : 'bot'}">${isUser ? '👤' : '<img src="bot.png" class="msg-avatar-img">'}</div>
        <div><div class="msg-bubble ${isUser ? 'usr' : 'bot'}">${formatText(m.text)}</div>${docsHtml}<div class="msg-time">${formatTime(m.time)}</div></div>
      </div>`;
    }).join('');
    if (state.typing) msgsHtml += `<div class="msg animate-slide"><div class="msg-avatar bot">🤖</div><div class="msg-bubble bot"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>`;
    msgsHtml += '<div id="chat-end"></div>';
    let quickHtml = state.messages.length <= 1 ? '<div class="quick-actions">' + quickActions.map(a => `<button class="quick-btn" onclick="sendChat(\'${a.q}\')">${a.label}</button>`).join('') + '</div>' : '';
    const sidebarHtml = `<div class="sidebar"><div class="sidebar-header">📁 หมวดหมู่เอกสาร</div><div style="padding:6px">${categories.map(c => `<div class="sidebar-item" onclick="sendChat('${c.name}')"><span class="icon">${c.icon}</span><span class="label">${c.name}</span><span class="count">${getDocsByCat(c.id).length}</span></div>`).join('')}</div><div class="sidebar-tip"><div class="tip-title">💡 แนะนำ</div><p>พิมพ์ "ช่วย" เพื่อดูวิธีใช้ หรือพิมพ์ชื่อแบบฟอร์มที่ต้องการค้นหา</p></div></div>`;
    tabContent = `<div class="chat-layout">${sidebarHtml}<div class="chat-main"><div class="chat-messages">${msgsHtml}</div>${quickHtml}<div class="chat-input"><input type="text" id="chatInput" placeholder="พิมพ์ค้นหา..." onkeydown="if(event.key==='Enter')sendChat()"><button class="send-btn" onclick="sendChat()">${SVG.send}</button></div><div class="chat-hint">เอกสาร อวท. — ดาวน์โหลดเฉพาะฟอร์มที่ต้องการ (ครบ 81 รายการ)</div></div></div>`;
  } else if (state.tab === 'browse') {
    let filtered = state.browseCat ? getDocsByCat(state.browseCat) : (state.browseSearch ? searchDocs(state.browseSearch) : documents);
    let listHtml = filtered.length ? filtered.map(doc => `<div class="doc-row"><div class="row-icon">${getCatInfo(doc.category).icon}</div><div class="row-info"><h4>${doc.name}</h4><div class="row-meta"><span>${doc.subcategory}</span>${doc.formNumber ? `<span class="form-tag">${doc.formNumber}</span>` : ''}</div></div><button class="row-dl-btn" onclick="handleDownload(documents.find(d=>d.id==='${doc.id}'),'browse-${doc.id}')">📥 ดาวน์โหลด</button></div>`).join('') : '<div class="empty-state">📭 ไม่พบเอกสาร</div>';
    tabContent = `<div class="search-bar">${SVG.search}<input type="text" id="browseSearchInput" placeholder="ค้นหาเอกสาร..." value="${state.browseSearch}" onkeydown="if(event.key==='Enter')performBrowseSearch()"><button style="position:absolute;right:5px;top:50%;transform:translateY(-50%);background:var(--primary);color:#fff;border:none;padding:6px 12px;border-radius:8px" onclick="performBrowseSearch()">ค้นหา</button></div>
      <div class="cat-grid"><div class="cat-card ${!state.browseCat && !state.browseSearch ? 'active' : ''}" onclick="state.browseCat=null;state.browseSearch='';document.getElementById('browseSearchInput').value='';render()"><span class="c-icon">📚</span><span class="c-name">ทั้งหมด</span><span class="c-count">${documents.length}</span></div>${categories.map(c => `<div class="cat-card ${state.browseCat === c.id ? 'active' : ''}" onclick="state.browseCat='${c.id}';state.browseSearch='';document.getElementById('browseSearchInput').value='';render()"><span class="c-icon">${c.icon}</span><span class="c-name">${c.name}</span><span class="c-count">${getDocsByCat(c.id).length}</span></div>`).join('')}</div>
      <div class="doc-list"><div class="doc-list-header"><h3>📄 เอกสารทั้งหมด <span>(${filtered.length})</span></h3></div>${listHtml}</div>`;
  } else if (state.tab === 'manage') {
    let filtered = state.manageCat ? getDocsByCat(state.manageCat) : (state.manageSearch ? documents.filter(d => (d.name + d.shortName).toLowerCase().includes(state.manageSearch.toLowerCase())) : documents);
    let listHtml = filtered.length ? filtered.map(doc => `<div class="manage-row"><div class="row-icon">${getCatInfo(doc.category).icon}</div><div class="row-info"><h4>${doc.name}</h4><div class="row-meta"><span class="cat-tag">${getCatInfo(doc.category).name}</span><span>${doc.subcategory}</span>${doc.formNumber ? `<span class="form-tag">${doc.formNumber}</span>` : ''}</div></div><div class="row-actions"><button class="act-btn dl" onclick="downloadDoc(documents.find(d=>d.id==='${doc.id}'))">📥</button><button class="act-btn edit" onclick="state.editDoc=documents.find(d=>d.id==='${doc.id}');state.showModal=true;render()">✏️</button><button class="act-btn del" onclick="state.deleteDoc=documents.find(d=>d.id==='${doc.id}');render()">🗑️</button></div></div>`).join('') : '<div class="empty-state">📭 ไม่พบเอกสาร</div>';
    tabContent = `<div class="manage-header"><div class="mh-inner"><div><h2>⚙️ จัดการเอกสารและแบบฟอร์ม</h2><p>เพิ่ม แก้ไข หรือลบเอกสาร — ทั้งหมด ${documents.length} รายการ (ครบทุกหมวด)</p></div><button class="add-btn" onclick="state.editDoc=null;state.showModal=true;render()">➕ เพิ่มเอกสารใหม่</button></div></div>
      <div class="manage-filters"><input type="text" id="manageSearchInput" placeholder="🔍 ค้นหาเอกสาร..." value="${state.manageSearch}" onkeydown="if(event.key==='Enter')performManageSearch()"><button style="background:var(--primary);color:#fff;border:none;padding:0 15px;border-radius:12px" onclick="performManageSearch()">ค้นหา</button><select id="manageCatSelect" onchange="state.manageCat=this.value||null;render()"><option value="">ทุกหมวดหมู่</option>${categories.map(c => `<option value="${c.id}" ${state.manageCat===c.id?'selected':''}>${c.icon} ${c.name}</option>`).join('')}</select></div>
      <div class="stats-grid">${categories.map(c => `<div class="stat-card ${state.manageCat===c.id?'active':''}" onclick="state.manageCat='${c.id}';render()"><div class="s-icon">${c.icon}</div><div class="s-num">${getDocsByCat(c.id).length}</div><div class="s-label">${c.name}</div></div>`).join('')}</div>
      <div class="doc-list"><div class="doc-list-header"><h3>📄 เอกสาร <span>(${filtered.length})</span></h3><button style="background:none;border:none;color:var(--primary)" onclick="state.editDoc=null;state.showModal=true;render()">➕ เพิ่มใหม่</button></div>${listHtml}</div>
      <div class="info-box"><h4></h4><div class="info-grid"><div><p></p><small></small></div><div><p></p><small></small></div><div><p></p><small></small></div><div><p></p><small></small></div><div><p></p><small></small></div></div></div>`;
  }
  
  app.innerHTML = `${toastHtml}${modalHtml}${confirmHtml}<header><div class="header-inner"><div class="header-left"><div class="logo"><img src="https://static.wixstatic.com/media/42949e_5cc1163de9b0451f96a4e0704535f1d4~mv2.png" alt="logo"></div><div class="header-title"><h1>อวท. วิทยาลัยการอาชีพบ้านโป่ง</h1><p>ระบบจัดการเอกสาร | 5 หมวดหมู่ตามคู่มือฯ | ครบทุกแบบฟอร์ม อวท.01-39</p></div></div><div class="header-badges"><span class="badge">✨ ผู้ช่วย อวท.</span><span class="badge">📄 ${documents.length} เอกสาร</span></div></div></header>
    <div class="tabs"><div class="tabs-inner"><button class="tab-btn ${state.tab==='chat'?'active':''}" onclick="state.tab='chat';render()">💬 AI ผู้ช่วย</button><button class="tab-btn ${state.tab==='browse'?'active':''}" onclick="state.tab='browse';render()">📚 คลังเอกสาร</button><button class="tab-btn ${state.tab==='manage'?'active':''}" onclick="state.tab='manage';render()">⚙️ จัดการเอกสาร</button></div></div>
    <div class="content">${tabContent}</div><footer>© 2567 องค์การนักวิชาชีพในอนาคตแห่งประเทศไทย | วิทยาลัยการอาชีพบ้านโป่ง จ.ราชบุรี</footer>`;
}

// ==================== INIT ====================
window.sendChat = sendChat;
window.handleDownload = handleDownload;
window.performBrowseSearch = performBrowseSearch;
window.performManageSearch = performManageSearch;
window.handleFormSubmit = handleFormSubmit;
window.confirmDelete = confirmDelete;
window.handleFileSelect = handleFileSelect;

loadFromFirebase();
</script>
</body>
</html>
